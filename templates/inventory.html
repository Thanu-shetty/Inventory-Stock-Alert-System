{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Inventory Management</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addProductModal">
        <i class="fas fa-plus me-2"></i>Add Product
    </button>
</div>

<div class="table-responsive">
    <table class="table table-hover table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Product Name</th>
                <th>Category</th>
                <th>Current Stock</th>
                <th>Min Threshold</th>
                <th>Max Threshold</th>
                <th>Unit Price</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="inventoryTable"></tbody>
    </table>
</div>

<!-- Add Product Modal -->
<div class="modal fade" id="addProductModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add New Product</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addProductForm">
                    <div class="mb-3">
                        <label>Product Name</label>
                        <input type="text" class="form-control" id="productName" required>
                    </div>
                    <div class="mb-3">
                        <label>Category</label>
                        <input type="text" class="form-control" id="productCategory" required>
                    </div>
                    <div class="mb-3">
                        <label>Initial Stock</label>
                        <input type="number" class="form-control" id="productStock" value="0">
                    </div>
                    <div class="mb-3">
                        <label>Min Threshold</label>
                        <input type="number" class="form-control" id="productMinThreshold" value="10">
                    </div>
                    <div class="mb-3">
                        <label>Max Threshold</label>
                        <input type="number" class="form-control" id="productMaxThreshold" value="100">
                    </div>
                    <div class="mb-3">
                        <label>Unit Price</label>
                        <input type="number" class="form-control" id="productPrice" value="0" step="0.01">
                    </div>
                    <button type="submit" class="btn btn-primary">Add Product</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function loadInventory() {
        $.get('/api/products', function (products) {
            const tbody = $('#inventoryTable');
            tbody.empty();

            products.forEach(product => {
                let statusBadge = '';
                if (product.current_stock <= product.min_threshold) {
                    statusBadge = '<span class="badge bg-danger">Critical</span>';
                } else if (product.current_stock >= product.max_threshold) {
                    statusBadge = '<span class="badge bg-info">Overstock</span>';
                } else {
                    statusBadge = '<span class="badge bg-success">Normal</span>';
                }

                tbody.append(`
                    <tr>
                        <td>${product.id}</td>
                        <td><strong>${product.name}</strong></td>
                        <td>${product.category}</td>
                        <td class="${product.current_stock <= product.min_threshold ? 'text-danger fw-bold' : ''}">${product.current_stock}</td>
                        <td>${product.min_threshold}</td>
                        <td>${product.max_threshold}</td>
                        <td>$${product.unit_price}</td>
                        <td>${statusBadge}</td>
                        <td>
                            <button class="btn btn-sm btn-primary me-1" onclick="openUpdateModal(${product.id}, '${product.name}')">
                                <i class="fas fa-exchange-alt"></i> Update
                            </button>
                            <button class="btn btn-sm btn-info" onclick="openThresholdModal(${product.id}, '${product.name}', ${product.min_threshold}, ${product.max_threshold})">
                                <i class="fas fa-sliders-h"></i> Set
                            </button>
                        </td>
                    </tr>
                `);
            });
        });
    }

    $('#addProductForm').on('submit', function (e) {
        e.preventDefault();

        const data = {
            name: $('#productName').val(),
            category: $('#productCategory').val(),
            current_stock: parseInt($('#productStock').val()),
            min_threshold: parseInt($('#productMinThreshold').val()),
            max_threshold: parseInt($('#productMaxThreshold').val()),
            unit_price: parseFloat($('#productPrice').val())
        };

        $.ajax({
            url: '/api/products',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: function () {
                showToast('Product added successfully');
                $('#addProductModal').modal('hide');
                $('#addProductForm')[0].reset();
                loadInventory();
                location.reload();
            },
            error: function () {
                showToast('Error adding product', 'danger');
            }
        });
    });

    $(document).ready(() => {
        loadInventory();
    });
</script>
{% endblock %}
